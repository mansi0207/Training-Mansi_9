<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipkart Clone</title>
    <link rel="stylesheet" href="flipkart.css">
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="top">
            <div class="logo">Flipkart</div>
            <div class="travel">Travel</div>
            <div class="location">Vadodara,Gujarat</div>
        </div>
        <div class="middle">
            <input type="text" placeholder="Search for Products, Brand and More">
            <span>Login</span>
            <span>More</span>
            <span>Cart</span>
        </div>
        <div class="bottom">
            <div class="box">
            </div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>

    </header>
    <!-- Hero Section -->
     <section id="hero">
        <div>
            <img src="https://rukminim1.flixcart.com/fk-p-flap/460/224/image/b6dd09c254ca63d5.jpg?q=80" alt="image1">
        </div>
        <div>
            <img src="https://rukminim1.flixcart.com/fk-p-flap/940/460/image/74ec22390112a984.jpg?q=60" alt="image2">
        </div>
        <div>
            <img src="https://rukminim1.flixcart.com/fk-p-flap/960/460/image/1a29c6dac2929c8a.png?q=60" alt="image3">
        </div>
     </section>
     <section id="rec">
        <div class="item">
            <img src="https://rukminim2.flixcart.com/image/612/612/xif0q/headphone/2/2/h/-original-imahnq7nyuupf4hv.jpeg?q=70" height="300px" width="300px">
            <p>$30</p>
        </div>
        <div class="item">
            <img src="https://rukminim2.flixcart.com/image/612/612/xif0q/headphone/2/2/h/-original-imahnq7nyuupf4hv.jpeg?q=70" height="300px" width="300px">
            <p>$30</p>
        </div>
        <div class="item">
            <img src="https://rukminim2.flixcart.com/image/612/612/xif0q/headphone/2/2/h/-original-imahnq7nyuupf4hv.jpeg?q=70" height="300px" width="300px">
            <p>$30</p>
        </div>
     </section>
     <!-- Footer -->
      <footer class="footer">
        <div class="description">
            <h2>Flipkart</h2>
            <p>Best to Place to Buy</p>
        </div>
        <div class="about">
            <h2>About</h2>
            <p>About us</p>
            <p>Contact us</p>
            <p>Carrer</p>
            <p>Inormation</p>
        </div>
        <div class="help">
            <h2>Help</h2>
            <p>Payment</p>
            <p>Orders</p>
            <p>Cancellation</p>
            <p>FAQ</p>
        </div>
        <p class="copy">&copy; 2023 Flipkart. All rights reserved.</p>
      </footer>
</body>
</html>
