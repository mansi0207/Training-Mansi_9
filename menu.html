<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Menu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f8f8f8;
      color: #333;
    }

    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 36px;
    }

    .menu-container {
      width: 90%;
      max-width: 1000px;
      margin: 30px auto;
    }

    .menu-section {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .menu-section h2 {
      margin-bottom: 15px;
      color: #c0392b;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .menu-item:last-child {
      border-bottom: none;
    }

    .price {
      font-weight: bold;
      color: #27ae60;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #222;
      color: white;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Royal Hotel Menu</h1>
    <p>Fresh Food • Best Taste • Fast Service</p>
  </header>

  <div class="menu-container">

    <div class="menu-section">
      <h2>Breakfast</h2>
      <div class="menu-item">
        <span>Poha</span>
        <span class="price">₹50</span>
      </div>
      <div class="menu-item">
        <span>Sandwich</span>
        <span class="price">₹80</span>
      </div>
      <div class="menu-item">
        <span>Tea</span>
        <span class="price">₹20</span>
      </div>
    </div>

    <div class="menu-section">
      <h2>Lunch</h2>
      <div class="menu-item">
        <span>Paneer Butter Masala</span>
        <span class="price">₹180</span>
      </div>
      <div class="menu-item">
        <span>Veg Biryani</span>
        <span class="price">₹150</span>
      </div>
      <div class="menu-item">
        <span>Dal Fry</span>
        <span class="price">₹120</span>
      </div>
    </div>

    <div class="menu-section">
      <h2>Dinner</h2>
      <div class="menu-item">
        <span>Butter Naan</span>
        <span class="price">₹40</span>
      </div>
      <div class="menu-item">
        <span>Shahi Paneer</span>
        <span class="price">₹200</span>
      </div>
      <div class="menu-item">
        <span>Jeera Rice</span>
        <span class="price">₹130</span>
      </div>
    </div>

  </div>

  <footer>
    <p>© 2026 Royal Hotel | Welcome Again!</p>
  </footer>

</body>

</html>
