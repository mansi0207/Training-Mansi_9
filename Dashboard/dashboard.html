<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            /* padding: 10px; */
            height: 700px;
            border: 2px solid black;
            display: grid;
            grid-template-rows: repeat(4,1fr);
            grid-template-columns: repeat(4,1fr);
            /* gap: 5px; */
        }
        .box1{
            background-color: gray;
            grid-row: 1/5;
        }
        .box2{
            background-color: rgb(70, 69, 69);
            grid-column: 2/5;
        }
        .box3{
            background-color: whitesmoke;
            grid-column: 2/5;
            grid-row: 2/5;
        }

        .box-contain{
            padding: 50px 20px;

            display: flex;
            justify-content: space-between;
        }
        #item{
            border-radius: 8px;
        }

        .box4{
            background-color: blue;
            width: 200px;
            height: 150px;
        }
        .box5{
            background-color: green;
            width: 200px;
            height: 150px;
        }
        .box6{
            background-color: yellowgreen;
            width: 200px;
            height: 150px;
        }
        .box7{
            background-color: purple;
            width: 200px;
            height: 150px;
        }
        .img{
            display: flex;
            justify-content: space-between;
            padding: 0px 20px;
        }

        img{
            border-radius: 8px;
            width: 430px;
            height: 250px;
        }
        
    </style>
</head>
<body>
    <div class="main">
        <div class="box1" id="box"></div>
        <div class="box2" id="box"></div>
        <div class="box3" id="box">
            <div class="box-contain">
                <div class="box4" id="item"></div>
                <div class="box5" id="item"></div>
                <div class="box6" id="item"></div>
                <div class="box7" id="item"></div>
                </div>
                <div class="img">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmd3x8xMJjPNHdW6uBJf_1zBhVRmKgcccj4hBEjiKEhIUN1olFU42WmTc&s=10">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSZ_80pmYoNEv1Dh7SlAfhP_JE5ks6CL0RVzf19j6LZBqDnG2K4uv2Is_w&s=10">
            </div>
        </div>
        <!-- <div class="box" id="box4">4</div> -->
    </div>
</body>
</html>
