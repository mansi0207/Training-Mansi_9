<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application - Form</title>
</head>
<body>
    <!-- header -->
    
    <header>
            <h1>Job Application Form</h1>
    </header>

    <!-- Form -->
    <main>
        <form>
            <fieldset>
                <legend>Personal Information</legend>
                <label for="name">NAme: </label>
                <input type="text" id="name" placeholder="John Doe" required>
                <br><br>
                <label for="email">Email: </label>
                <input type="email" id="email" placeholder="example@mail.com" required>
                <br><br>
                <label for="numder">Number: </label>
                <input type="tel" id="number" placeholder="123-4567-890" required>
                <br><br>
                <label for="dob">DOB: </label>
                <input type="date" id="dob">
            </fieldset>

            <br>
            <fieldset>
                <legend>Gender Information</legend>
                <input type="radio" id="female" name="gender">
                <label for="female">Female</label>
                <br>
                <input type="radio" id="male" name="gender">
                <label for="male">Male</label>
                <br>
                <input type="radio" id="other" name="gender">
                <label for="other">Other</label>
            </fieldset>
            <br>
            <!-- Skills -->

            <fieldset>
                <legend>Skills</legend>
                <input type="checkbox" id="mern">
                <label for="mern">MERN</label>
                <br>
                <input type="checkbox" id="ai_developer">
                <label for="ai_developer">AI Developer</label>
                <br>
                <input type="checkbox" id="data">
                <label for="data">Data Analyst</label>
                <br>
                <input type="checkbox" id="cloud">
                <label for="cloud">Cloud Engineer</label>
            </fieldset>
            <br>
            <!--Additional Information  -->
            <fieldset>
                <legend>Additional Information</legend>
                <!-- Experience -->
                 <label for="experience">Years of Experience:</label>
                 <select id="experience">
                    <option disabled selected>Select</option>
                    <option>Fresher</option>
                    <option>1 Year</option>
                    <option>2 Year</option>
                    <option>3+ Year</option>
                 </select>
                 <!-- Location -->
                  <br>
                  <br>
                  <label for="location">Prefered Location:</label>
                  <select name="" id="">
                    <option disabled selected>Select</option>
                    <option value="vd">Vadodara</option>
                    <option value="in">Indore</option>
                    <option value="nd">Noida</option>
                    <option value="hyd">Hyderabad</option>
                  </select>
                  <br><br>
                  <!-- Upload Resume -->
                   <label for="resume">Upload Resume:</label>
                   <input type="file" id="resume" maxlength="10MB" accept=".pdf,.html">
            </fieldset>
            <!-- Submit button -->
             <button type="submit">Submit</button>
             <button type="reset">Reset</button>
        </form>
    </main>
</body>
</html>
