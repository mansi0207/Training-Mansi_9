<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <!-- header -->
     <h2>Student Marksheet Table</h2>
     <table border="">
        <thead>
        <tr>
            <th>Name</th>
            <th>Subject</th>
            <th>Marks</th>
        </tr>
        </thead>

        <tbody>
            <tr>
                <td rowspan="2">Mansi</td>
                <td>HTML</td>
                <td>91</td>
            </tr>
            <tr>
                <td>CSS</td>
                <td>90</td>
            </tr>
            <tr>
                <td rowspan="2">Saliya</td>
                <td>JavaScript</td>
                <td>80</td>
            </tr>
            <tr>
                <td>React</td>
                <td>100</td>
            </tr>
           <tfoot>
            <tr>
                <td colspan="2">Total</td>
                <td>400</td>
            </tr>
           </tfoot>
        </tbody>
    </table>
</body>
</html>
