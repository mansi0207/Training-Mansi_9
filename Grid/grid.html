<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>
    <style>
        .container{
            display: flex;
            align-items: center;
            justify-content: center;
            height: 500px;
        }
        .box{
            border: 2px solid black;
            width: 25%;
            height: 300px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(6,1fr);
            grid-template-rows: repeat(5,1fr);  
            gap: 10px;
        }
        #box{
            border: 2px solid black;
            
        }
        .box1{
            grid-column: 1/3;
            grid-row: 1/3;
        }
        .box4{
            grid-column: 5/7;
            grid-row: 1/3;
        }
        .box7{
            grid-column: 1/7;

        }
        .box8{
            grid-column: 1/3;
            
        }
        .box9{
            grid-column: 3/6;
        }
        
    </style>
</head>
<body>
    <div class="container">

        <div class="box">
            <div class="box1" id="box">1</div>
            <div class="box2" id="box">2</div>
            <div class="box3" id="box">3</div>
            <div class="box4" id="box">4</div>
            <div class="box5" id="box">5</div>
            <div class="box6" id="box">6</div>
            <div class="box7" id="box">7</div>
            <div class="box8" id="box">8</div>
            <div class="box9" id="box">9</div>
            <div class="box10" id="box">10</div>
        </div>
    </div>
</body>
</html>
